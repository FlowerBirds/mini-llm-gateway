<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Gateway - 统计</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>LLM Gateway</h1>
            <nav>
                <a href="/config">配置</a>
                <a href="/dashboard" class="active">统计</a>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span class="icon" id="themeIcon">🌙</span>
                    <span id="themeText">深色</span>
                </button>
            </nav>
        </header>

        <div class="stats-grid">
            <div class="stat-card accent-blue">
                <h3>总请求次数</h3>
                <div class="value" id="totalRequests">0</div>
            </div>
            <div class="stat-card accent-green">
                <h3>输入 Tokens</h3>
                <div class="value" id="inputTokens">0</div>
            </div>
            <div class="stat-card accent-orange">
                <h3>输出 Tokens</h3>
                <div class="value" id="outputTokens">0</div>
            </div>
            <div class="stat-card accent-purple">
                <h3>缓存命中 (Read)</h3>
                <div class="value" id="cacheReadTokens">0</div>
            </div>
            <div class="stat-card accent-pink">
                <h3>缓存创建 (Creation)</h3>
                <div class="value" id="cacheCreationTokens">0</div>
            </div>
            <div class="stat-card accent-blue">
                <h3>平均吞吐量 (tok/s)</h3>
                <div class="value" id="avgThroughput">0</div>
            </div>
            <div class="stat-card accent-red">
                <h3>错误率</h3>
                <div class="value" id="errorRate">0%</div>
            </div>
            <div class="stat-card accent-gold">
                <h3>总费用 (¥)</h3>
                <div class="value" id="totalCost">¥0.00</div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;">每小时趋势</h2>
                <div class="time-range">
                    <button onclick="setRange(24)" data-range="24">24h</button>
                    <button onclick="setRange(168)" data-range="168">7天</button>
                    <button onclick="setRange(720)" data-range="720">30天</button>
                    <button onclick="setRange(8760)" data-range="8760" class="active">1年</button>
                </div>
            </div>
            <div style="height: 35vh; position: relative;">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>按模型统计</h2>
            <div id="modelStats">
                <div class="empty">暂无数据</div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <h2 style="margin: 0;">请求历史</h2>
                    <div class="refresh-indicator">
                        <span class="dot"></span>
                        <span>自动刷新</span>
                    </div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="showResetConfirm()">重置统计</button>
            </div>
            <div id="historyList">
                <div class="empty">暂无历史记录</div>
            </div>
        </div>
    </div>

    <!-- Reset confirmation dialog -->
    <div id="resetConfirmOverlay" class="reset-confirm-overlay" style="display:none;">
        <div class="reset-confirm-box">
            <h3>⚠ 重置统计数据</h3>
            <p>此操作将清除所有统计数据和历史记录，且不可恢复。请输入 <strong>RESET</strong> 以确认：</p>
            <input type="text" id="resetConfirmInput" placeholder="输入 RESET 确认" autocomplete="off">
            <div class="btn-group">
                <button class="btn btn-sm" style="background:#333;color:#aaa;" onclick="hideResetConfirm()">取消</button>
                <button class="btn btn-danger btn-sm" id="resetConfirmBtn" onclick="confirmReset()" disabled>确认重置</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let hourlyChart = null;
        let currentRange = 8760;

        const chartColors = {
            input: '#00d4ff',
            output: '#2ed573',
            total: '#ffa502',
            requests: '#ff6b81',
            grid: 'rgba(255,255,255,0.1)',
            text: '#888888'
        };

        function getChartGridColor() {
            const isDark = !document.documentElement.hasAttribute('data-theme') ||
                          document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
        }

        function getChartTextColor() {
            const isDark = !document.documentElement.hasAttribute('data-theme') ||
                          document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? '#888' : '#666';
        }

        // Theme management
        function getStoredTheme() {
            return localStorage.getItem('theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeUI(theme);
            // Update chart colors if chart exists
            if (hourlyChart) {
                updateChartColors();
            }
        }

        function updateThemeUI(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'light') {
                icon.textContent = '☀️';
                text.textContent = '浅色';
            } else {
                icon.textContent = '🌙';
                text.textContent = '深色';
            }
        }

        function toggleTheme() {
            const current = getStoredTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        function updateChartColors() {
            chartColors.grid = getChartGridColor();
            chartColors.text = getChartTextColor();
        }

        // Initialize theme on page load
        setTheme(getStoredTheme());

        function formatNum(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toString();
        }

        function formatHour(isoStr) {
            const d = new Date(isoStr);
            return d.getHours().toString().padStart(2, '0') + ':00';
        }

        function formatHourFull(isoStr) {
            const d = new Date(isoStr);
            return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':00';
        }

        function relativeTime(isoStr) {
            const now = Date.now();
            const then = new Date(isoStr).getTime();
            const diff = Math.floor((now - then) / 1000);
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            return Math.floor(diff / 86400) + '天前';
        }

        function setRange(hours) {
            currentRange = hours;
            document.querySelectorAll('.time-range button').forEach(b => {
                b.classList.toggle('active', parseInt(b.dataset.range) === hours);
            });
            loadHourlyStats();
        }

        async function loadHourlyStats() {
            const res = await fetch(`${API_BASE}/v1/admin/stats/hourly?hours=${currentRange}`);
            const data = await res.json();
            const hourlyData = data.hourly || [];

            if (hourlyData.length === 0) {
                if (hourlyChart) hourlyChart.destroy();
                return;
            }

            const labels = hourlyData.map(h => formatHourFull(h.hour));
            const inputTokens = hourlyData.map(h => h.input_tokens);
            const outputTokens = hourlyData.map(h => h.output_tokens);
            const totalTokens = hourlyData.map(h => h.input_tokens + h.output_tokens);
            const requests = hourlyData.map(h => h.requests);

            if (hourlyChart) hourlyChart.destroy();

            const ctx = document.getElementById('hourlyChart').getContext('2d');
            hourlyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '输入 Tokens', data: inputTokens, borderColor: chartColors.input, backgroundColor: chartColors.input + '33', tension: 0.3, fill: false, yAxisID: 'y', pointRadius: currentRange > 720 ? 0 : 2 },
                        { label: '输出 Tokens', data: outputTokens, borderColor: chartColors.output, backgroundColor: chartColors.output + '33', tension: 0.3, fill: false, yAxisID: 'y', pointRadius: currentRange > 720 ? 0 : 2 },
                        { label: '总 Tokens', data: totalTokens, borderColor: chartColors.total, backgroundColor: chartColors.total + '33', tension: 0.3, fill: false, yAxisID: 'y', pointRadius: currentRange > 720 ? 0 : 2 },
                        { label: '请求次数', data: requests, borderColor: chartColors.requests, backgroundColor: chartColors.requests + '33', tension: 0.3, fill: false, yAxisID: 'y2', pointRadius: currentRange > 720 ? 0 : 2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: chartColors.text, usePointStyle: true, pointStyle: 'circle', padding: 16 } },
                        tooltip: {
                            callbacks: {
                                label: ctx => ctx.dataset.label + ': ' + formatNum(ctx.raw)
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: chartColors.text, maxTicksLimit: 20, maxRotation: 45 },
                            grid: { color: chartColors.grid }
                        },
                        y: {
                            type: 'linear', display: true, position: 'left',
                            title: { display: true, text: 'Tokens', color: chartColors.text },
                            ticks: { color: chartColors.text, callback: v => formatNum(v) },
                            grid: { color: chartColors.grid }
                        },
                        y2: {
                            type: 'linear', display: true, position: 'right',
                            title: { display: true, text: '请求次数', color: chartColors.text },
                            ticks: { color: chartColors.text, callback: v => formatNum(v) },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        async function loadStats() {
            const res = await fetch(`${API_BASE}/v1/admin/stats`);
            const data = await res.json();

            document.getElementById('totalRequests').textContent = formatNum(data.summary.total_requests);
            document.getElementById('inputTokens').textContent = formatNum(data.summary.total_input_tokens);
            document.getElementById('outputTokens').textContent = formatNum(data.summary.total_output_tokens);
            document.getElementById('cacheReadTokens').textContent = formatNum(data.summary.total_cache_read_tokens || 0);
            document.getElementById('cacheCreationTokens').textContent = formatNum(data.summary.total_cache_creation_tokens || 0);
            document.getElementById('avgThroughput').textContent = (data.summary.avg_throughput || 0).toFixed(1);

            const totalReqs = data.summary.total_requests || 0;
            const totalErrorCount = Object.values(data.by_model || {}).reduce((s, m) => s + (m.errors || 0), 0);
            const errorRate = totalReqs > 0 ? (totalErrorCount / totalReqs * 100).toFixed(1) : '0.0';
            document.getElementById('errorRate').textContent = errorRate + '%';

            const byModel = data.by_model || {};
            const modelStatsEl = document.getElementById('modelStats');

            if (Object.keys(byModel).length === 0) {
                modelStatsEl.innerHTML = '<div class="empty">暂无数据</div>';
            } else {
                let totalCost = 0;
                const rows = Object.entries(byModel).map(([id, stats]) => {
                    const inputPrice = stats.input_price || 0;
                    const outputPrice = stats.output_price || 0;
                    const cacheReadPrice = stats.cache_read_price || 0;
                    const cost = (stats.input_tokens / 1e6 * inputPrice)
                               + (stats.output_tokens / 1e6 * outputPrice)
                               + ((stats.cache_read_tokens || 0) / 1e6 * cacheReadPrice);
                    totalCost += cost;
                    return `<tr>
                        <td>${id}</td>
                        <td>${stats.requests}</td>
                        <td>${formatNum(stats.input_tokens)}</td>
                        <td>${formatNum(stats.output_tokens)}</td>
                        <td>${formatNum(stats.cache_read_tokens || 0)}</td>
                        <td>${formatNum(stats.cache_creation_tokens || 0)}</td>
                        <td>${inputPrice > 0 ? inputPrice.toFixed(2) : '-'}</td>
                        <td>${outputPrice > 0 ? outputPrice.toFixed(2) : '-'}</td>
                        <td>${cacheReadPrice > 0 ? cacheReadPrice.toFixed(2) : '-'}</td>
                        <td style="color:#ffa502;font-weight:600;">¥${cost.toFixed(2)}</td>
                        <td>${stats.errors > 0 ? '<span style="color:#ff4757;">' + stats.errors + '</span>' : '0'}</td>
                        <td>${(stats.avg_throughput || 0).toFixed(1)}</td>
                    </tr>`;
                }).join('');
                const totalRequests = Object.values(byModel).reduce((s,m) => s + (m.requests||0), 0);
                const totalInput = Object.values(byModel).reduce((s,m) => s + (m.input_tokens||0), 0);
                const totalOutput = Object.values(byModel).reduce((s,m) => s + (m.output_tokens||0), 0);
                const totalCacheRead = Object.values(byModel).reduce((s,m) => s + (m.cache_read_tokens||0), 0);
                const totalCacheCreation = Object.values(byModel).reduce((s,m) => s + (m.cache_creation_tokens||0), 0);
                const totalErrors = Object.values(byModel).reduce((s,m) => s + (m.errors||0), 0);
                modelStatsEl.innerHTML = `
                    <div class="table-wrap"><table>
                        <thead>
                            <tr>
                                <th>模型</th>
                                <th>请求次数</th>
                                <th>输入 Tokens</th>
                                <th>输出 Tokens</th>
                                <th>缓存命中</th>
                                <th>缓存创建</th>
                                <th>输入单价(¥/1M)</th>
                                <th>输出单价(¥/1M)</th>
                                <th>缓存命中单价(¥/1M)</th>
                                <th>费用(¥)</th>
                                <th>错误次数</th>
                                <th>平均吞吐(tok/s)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                            <tr style="font-weight:700;border-top:2px solid var(--accent);">
                                <td>合计</td>
                                <td>${totalRequests}</td>
                                <td>${formatNum(totalInput)}</td>
                                <td>${formatNum(totalOutput)}</td>
                                <td>${formatNum(totalCacheRead)}</td>
                                <td>${formatNum(totalCacheCreation)}</td>
                                <td>-</td>
                                <td>-</td>
                                <td>-</td>
                                <td style="color:#ffa502;font-weight:600;">¥${totalCost.toFixed(2)}</td>
                                <td>${totalErrors}</td>
                                <td>-</td>
                            </tr>
                        </tbody>
                    </table></div>
                `;
                document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(2);
            }

            const history = data.history || [];
            const historyEl = document.getElementById('historyList');

            if (history.length === 0) {
                historyEl.innerHTML = '<div class="empty">暂无历史记录</div>';
            } else {
                historyEl.innerHTML = `
                    <div class="table-wrap"><table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>模型</th>
                                <th>输入</th>
                                <th>输出</th>
                                <th>耗时(s)</th>
                                <th>吞吐(tok/s)</th>
                                <th>缓存命中</th>
                                <th>缓存创建</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${history.slice(-100).reverse().map(h => `
                                <tr>
                                    <td>${new Date(h.timestamp).toLocaleString()}<span class="relative-time">${relativeTime(h.timestamp)}</span></td>
                                    <td>${h.model}</td>
                                    <td>${formatNum(h.input_tokens)}</td>
                                    <td>${formatNum(h.output_tokens)}</td>
                                    <td>${(h.duration || 0).toFixed(2)}</td>
                                    <td>${(h.throughput || 0).toFixed(1)}</td>
                                    <td>${formatNum(h.cache_read_tokens || 0)}</td>
                                    <td>${formatNum(h.cache_creation_tokens || 0)}</td>
                                    <td>${h.error ? '<span class="badge badge-inactive">错误</span>' : '<span class="badge badge-active">成功</span>'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table></div>
                `;
            }
        }

        function showResetConfirm() {
            document.getElementById('resetConfirmOverlay').style.display = 'flex';
            document.getElementById('resetConfirmInput').value = '';
            document.getElementById('resetConfirmBtn').disabled = true;
            document.getElementById('resetConfirmInput').focus();
        }

        function hideResetConfirm() {
            document.getElementById('resetConfirmOverlay').style.display = 'none';
        }

        document.getElementById('resetConfirmInput').addEventListener('input', function() {
            document.getElementById('resetConfirmBtn').disabled = this.value !== 'RESET';
        });

        document.getElementById('resetConfirmOverlay').addEventListener('click', function(e) {
            if (e.target === this) hideResetConfirm();
        });

        async function confirmReset() {
            if (document.getElementById('resetConfirmInput').value !== 'RESET') return;
            hideResetConfirm();
            await fetch(`${API_BASE}/v1/admin/stats/reset`, { method: 'POST' });
            loadStats();
            loadHourlyStats();
        }

        loadStats();
        loadHourlyStats();
        setInterval(loadStats, 5000);
        setInterval(loadHourlyStats, 30000);
    </script>
</body>
</html>
